services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: dev
    ports:
      - 3000:3000
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/dist:/app/packages/backend/dist
      - ./packages/backend/config:/app/packages/backend/config
      - ./packages/entities/dist:/app/packages/entities/dist
    environment:
      MONGODB_URI: mongodb://mongodb:27017/resume-builder
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis

  mcp:
    image: ghcr.io/apollographql/apollo-mcp-server:latest
    environment:
      - GRAPHQL_ENDPOINT
      - AUTH0_DOMAIN
      - AUTH0_AUDIENCE
    ports:
      - 8000:8000
    volumes:
      - mcp:/data
      - ./packages/mcp/config.yaml:/config.yaml
      - ./packages/mcp/operations:/operations
      - ./schema.gql:/schema.gql
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - mongodb
    command: /config.yaml

  mongodb:
    image: mongo:latest
    ports:
      - 27017:27017
    volumes:
      - mongodb:/data/db
      - ./backup:/backup

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis:/data
    command: redis-server --appendonly yes

  web:
    build:
      context: .
      dockerfile: packages/resume-builder/Dockerfile
      target: dev
    ports:
      - 5173:5173
    volumes:
      - ./packages/resume-builder/src:/app/packages/resume-builder/src
      - ./packages/resume-builder/dist:/app/packages/resume-builder/dist
      - ./packages/entities/dist:/app/packages/entities/dist
      - ./packages/entities/schemas:/app/packages/entities/schemas
    depends_on:
      - backend

volumes:
  mongodb:
  mcp:
  redis:
