apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: {{ .Values.mongodb.name }}
spec:
  members: {{ .Values.mongodb.members }}
  type: ReplicaSet
  version: {{ .Values.mongodb.version | quote }}

  security:
    authentication:
      modes: ["SCRAM"]

  additionalMongodConfig:
    net:
      bindIp: 0.0.0.0

  users:
    - name: {{ .Values.mongodb.username }}
      db: admin
      passwordSecretRef:
        name: {{ .Values.mongodb.name }}-password
      roles:
        - name: readWrite
          db: {{ .Values.mongodb.database }}
      scramCredentialsSecretName: {{ .Values.mongodb.username }}-scram

  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: {{ .Values.mongodb.storage }}
