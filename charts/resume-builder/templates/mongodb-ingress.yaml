{{- if .Values.ingress.enabled -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ include "resume-builder.fullname" . }}
  labels:
    {{- include "resume-builder.labels" . | nindent 4 }}
spec:
  entryPoints:
    - mongodb
  routes:
    - match: HostSNI(`mongodb.resume-builder.{{ .Values.domain }}`)
      priority: 100
      services:
        - name: {{ .Values.mongodb.name }}-svc
          port: {{ .Values.mongodb.port }}
  tls: {}
{{- end }}
