# Default values for resume-builder.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

# -- Backend (NestJS API)
backend:
  replicaCount: 1
  image:
    repository: registry.mattstrom.com/resume-builder-backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 3000
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Web (Vite/React frontend)
web:
  replicaCount: 1
  image:
    repository: registry.mattstrom.com/resume-builder-web
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 5173
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- MongoDB Community Operator
mongodb:
  name: resume-builder-mongodb
  version: '7.0.5'
  members: 3
  storage: 10Gi
  database: resume-builder
  username: appuser
  password: ''

# -- Ingress
ingress:
  enabled: true
  className: traefik
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: resume-builder.mattstrom.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /graphql
          pathType: Prefix
          service: backend
  tls: []
  #  - secretName: resume-builder-tls
  #    hosts:
  #      - resume.mattstrom.com

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ''
